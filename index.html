<script>
function compare(){
  const a=document.getElementById('text1').value.split('\n');
  const b=document.getElementById('text2').value.split('\n');
  const diff=computeDiff(a,b);
  renderDiff(diff,a,b);
}

function computeDiff(a,b){
  // Simple LCS-based diff
  const m=a.length,n=b.length;
  const dp=Array.from({length:m+1},()=>Array(n+1).fill(0));
  for(let i=1;i<=m;i++)for(let j=1;j<=n;j++){
    dp[i][j]=a[i-1]===b[j-1]?dp[i-1][j-1]+1:Math.max(dp[i-1][j],dp[i][j-1]);
  }
  // Backtrack
  const result=[];
  let i=m,j=n;
  while(i>0||j>0){
    if(i>0&&j>0&&a[i-1]===b[j-1]){result.unshift({type:'ctx',a:i-1,b:j-1});i--;j--}
    else if(j>0&&(i===0||dp[i][j-1]>=dp[i-1][j])){result.unshift({type:'add',b:j-1});j--}
    else{result.unshift({type:'del',a:i-1});i--}
  }
  return result;
}

function renderDiff(diff,a,b){
  let adds=0,dels=0;
  let html='';
  for(const d of diff){
    if(d.type==='ctx'){
      html+=`<div class="diff-line diff-ctx"><span class="diff-num">${d.a+1}</span><span class="diff-content"><span class="diff-prefix" style="color:var(--text-dim)"> </span>${esc(a[d.a])}</span></div>`;
    }else if(d.type==='del'){
      dels++;
      html+=`<div class="diff-line diff-del"><span class="diff-num">${d.a+1}</span><span class="diff-content"><span class="diff-prefix">-</span>${esc(a[d.a])}</span></div>`;
    }else if(d.type==='add'){
      adds++;
      html+=`<div class="diff-line diff-add"><span class="diff-num">${d.b+1}</span><span class="diff-content"><span class="diff-prefix">+</span>${esc(b[d.b])}</span></div>`;
    }
  }
  document.getElementById('output').innerHTML=html||'<div style="padding:20px;color:var(--text-dim);text-align:center">No differences — texts are identical</div>';
  document.getElementById('stats').innerHTML=`<span class="stat-add">+${adds} added</span> <span class="stat-del">-${dels} deleted</span> <span>${diff.filter(d=>d.type==='ctx').length} unchanged</span>`;
}

function swap(){
  const t1=document.getElementById('text1'),t2=document.getElementById('text2');
  const tmp=t1.value;t1.value=t2.value;t2.value=tmp;
  compare();
}

function clear(){
  document.getElementById('text1').value='';document.getElementById('text2').value='';
  document.getElementById('output').innerHTML='';document.getElementById('stats').innerHTML='';
}

function sample(){
  document.getElementById('text1').value='model: brain\nmodel_context_length: 128000\nsmart_model_routing:\n  enabled: true\n  cheap_model: qwen35-9b\nreasoning_effort: medium';
  document.getElementById('text2').value='model: brain\nmodel_context_length: 1000000\nsmart_model_routing:\n  enabled: false\nreasoning_effort: medium';
  compare();
}

function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),2500)}

if('serviceWorker' in navigator)navigator.serviceWorker.register('service-worker.js').catch(()=>{});
</script>
